spring.application.name=GigMap-api

spring.datasource.url=jdbc:postgresql://aws-1-us-east-1.pooler.supabase.com:5432/postgres
spring.datasource.username=postgres.mvksizgiecklfdelhlfx
spring.datasource.password=@reizcode209#

# JPA / Hibernate
spring.jpa.show-sql=true
# Make ddl-auto configurable via env var to avoid accidental schema changes against shared DB
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# HikariCP connection pool tuning (reduce max connections to avoid exhausting Supabase pooler limits)
# Adjust these values according to your database pool limits. For Supabase poolers a small pool (2-8) is recommended.
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL_SIZE:5}
spring.datasource.hikari.minimum-idle=${HIKARI_MIN_IDLE:2}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT_MS:300000}
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME_MS:1800000}
spring.datasource.hikari.connection-timeout=${HIKARI_CONNECTION_TIMEOUT_MS:30000}
spring.jpa.hibernate.naming.physical-strategy=com.staybits.gigmapapi.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy

documentation.application.description=@project.description@
documentation.application.version=@project.version@

jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGeneration12345changethisinsecureproductionkey}


jwt.expiration=${JWT_EXPIRATION:86400000}
